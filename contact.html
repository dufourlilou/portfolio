    <section class="contact-hero">
        <div class="nuage-magique nuage1"></div>
        <div class="deco-lune"></div>

        <div class="contenu-contact">
            <h1 class="hero-titre"> Contactez-moi</h1>
            <p class="hero-subtitle">Une question, un projet ou autre...</p>

            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Nom</label>
                    <input type="text" id="name" name="name" placeholder="Votre nom" required>
                </div>

                <div class="form-group">
                    <label for="prénom">Prénom</label>
                    <input type="text" id="prénom" name="prénom" placeholder="Votre prénom" required>
                </div>

                <div class="form-group">
                    <label for="email">Adresse e-mail</label>
                    <input type="email" id="email" name="email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Dites-moi tout..." required></textarea>
                </div>

                <button type="submit" class="cta-button">✨ Envoyer le message</button>
            </form>
        </div>
    </section>

        <div class="footer-content">

            boutonBurger.classList.toggle('active');
        });
